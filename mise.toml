[tools]
"github:orhun/git-cliff" = "2.13.1"
actionlint = "1.7.12"
pinact = "4.1.0"
biome = "2.5.4"
ghalint = "1.5.6"
gitleaks = "8.30.1"
hk = "1.50.0"
shellcheck = "0.11.0"
"aqua:anordal/shellharden" = "4.3.2"
shfmt = "3.13.1"
lua = "5.4"
rumdl = "0.2.31"
stylua = "2.5.2"
tombi = "1.2.0"
typos = "1.48.0"
uv = "0.11.28"
"github:owenlamont/ryl" = "0.21.0"
zizmor = "1.26.1"

[tasks.docs]
run = "uvx --from git+https://github.com/hugoh/spoon-tools spoon-generate-docs"
description = "Generate docs/docs.json and docs/index.html from docstrings"

[tasks.package]
depends = ["docs"]
run = """
rm -rf dist
mkdir -p dist/ProcessWatcher.spoon
cp init.lua LICENSE README.md docs/docs.json dist/ProcessWatcher.spoon/
cp -r bin dist/ProcessWatcher.spoon/
cd dist
zip -r ../ProcessWatcher.spoon.zip ProcessWatcher.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained ProcessWatcher.spoon.zip (includes docs.json)"

[tasks.test]
run = "busted test_spec.lua --verbose"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true
